name: Check Workshop Sync

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'tasks/**'
      - 'sync_workshops.py'
      - 'requirements.txt'
      - '.github/workflows/check-workshop-sync.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'tasks/**'
      - 'sync_workshops.py'
      - 'requirements.txt'
      - '.github/workflows/check-workshop-sync.yml'
  workflow_dispatch: {}

jobs:
  check-workshop-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate workshop folders
        run: python sync_workshops.py --check
